name: "Check formatting"
on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
jobs:
  run_format:
    name: "Check formatting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Install dependencies
        run: yarn
      - name: Check formatting
        run: node ./node_modules/prettier/bin/prettier.cjs --check src/ static/lang/ config.example.json
